name: Validate Examples

on:
  pull_request:
    paths:
      - "examples/**"
  workflow_run:
    workflows: ["Release CLI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  discover:
    name: Discover examples
    runs-on: ubuntu-latest
    # Skip if triggered by a failed release
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      examples: ${{ steps.find.outputs.examples }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        name: Find buildable examples
        run: |
          # Find directories in examples/ that contain buildable indicators
          # at any depth up to 2 levels (handles monorepo examples like brainwaves/apps/*)
          examples=$(find examples -mindepth 1 -maxdepth 1 -type d | while read dir; do
            name=$(basename "$dir")
            if find "$dir" -maxdepth 2 \( -name package.json -o -name requirements.txt -o -name moose.config.toml -o -name setup.py -o -name pnpm-workspace.yaml \) -print -quit | grep -q .; then
              echo "$name"
            fi
          done | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "examples=$examples" >> "$GITHUB_OUTPUT"
          echo "Found examples: $examples"

  validate:
    name: Validate ${{ matrix.example }}
    needs: discover
    if: ${{ needs.discover.outputs.examples != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.discover.outputs.examples) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: examples/${{ matrix.example }}
        run: |
          if [ -f "pnpm-workspace.yaml" ] || [ -f "pnpm-lock.yaml" ]; then
            corepack enable
            pnpm install --frozen-lockfile || pnpm install
          elif [ -f "package-lock.json" ]; then
            npm ci
          elif [ -f "package.json" ]; then
            npm install
          fi
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          if [ -f "setup.py" ]; then
            pip install -e .
          fi

      # Note: ideally we'd run `moose build` here per the design spec,
      # but that requires ClickHouse and other infrastructure.
      # For now we validate that deps install and code compiles.
      - name: Build / typecheck
        working-directory: examples/${{ matrix.example }}
        run: |
          if [ -f "pnpm-workspace.yaml" ] || [ -f "pnpm-lock.yaml" ]; then
            # pnpm workspace — use pnpm for build
            if pnpm run build --if-present; then
              echo "pnpm build succeeded"
            else
              echo "::warning::Build failed for ${{ matrix.example }}"
              exit 1
            fi
          elif [ -f "package.json" ]; then
            # Check if build or typecheck scripts exist before running
            if node -e "const p=require('./package.json'); process.exit(p.scripts?.build ? 0 : 1)" 2>/dev/null; then
              npm run build
            elif node -e "const p=require('./package.json'); process.exit(p.scripts?.typecheck ? 0 : 1)" 2>/dev/null; then
              npm run typecheck
            else
              echo "No build/typecheck script found, deps install verified"
            fi
          fi
          if [ -f "requirements.txt" ] || [ -f "setup.py" ]; then
            python -c "import moose_lib; print('moose_lib imported successfully')" || echo "Python deps verified (moose_lib not a direct dep)"
          fi
