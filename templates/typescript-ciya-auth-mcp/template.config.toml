language = "typescript" # Must be typescript or python
description = "TypeScript monorepo with Express for serving analytical APIs, and a frontend with AI chat and MCP configured"
post_install_print = """
Deploy on Boreal

The easiest way to deploy your MooseStack Applications is to use Boreal
from the creators of MooseStack.

https://boreal.cloud

---------------------------------------------------------

📂 Go to your project directory:
    $ cd {project_dir}

📦 Install all dependencies:
    $ pnpm install

📦 Create API Key authentication tokens
    $ cp packages/moosestack-service/.env.{example,local}
    $ cp packages/web-app/.env.{example,local}
    $ cd packages/moosestack-service
    $ moose generate hash-token # use output for the API Key & Token below

📦 Copy & Set environment variables
    1. Set MCP_API_KEY in packages/moosestack-service/.env.local to the `ENV API Key` (hashed) from moose generate hash-token
    2. Set MCP_API_TOKEN in packages/web-app/.env.local to the `Bearer Token` (plaintext) from moose generate hash-token
    3. Set ANTHROPIC_API_KEY in packages/web-app/.env.local to your Anthropic API key

🚀 Start both services:
    $ cd ../.. # go back to project root
    $ pnpm dev

Or start services individually:
    $ pnpm dev:moose    # Start MooseStack service only
    $ pnpm dev:web      # Start web app only
"""
default_sloan_telemetry = "standard"

# Boreal one-click deploy configuration
[boreal]
enabled = true
display_name = "Chat with your App"
short_description = "Deploy an AI chat app that can query your data"

# Commands Boreal runs during setup, with JSON output parsing
[[boreal.setup_commands]]
command = "moose generate hash-token --json"
outputs = [
  { env_var = "MCP_API_KEY", json_path = "api_key_hash" },
  { env_var = "MCP_API_TOKEN", json_path = "bearer_token" }
]

# Env vars user must provide
[[boreal.env_vars]]
name = "ANTHROPIC_API_KEY"
label = "Anthropic API Key"
secret = true
required = true

# Tier 2/3 (optional): Clerk authentication
[[boreal.env_vars]]
name = "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
label = "Clerk Publishable Key"
secret = false
required = false

[[boreal.env_vars]]
name = "CLERK_SECRET_KEY"
label = "Clerk Secret Key"
secret = true
required = false

[[boreal.env_vars]]
name = "JWKS_URL"
label = "Clerk JWKS URL"
secret = false
required = false

[[boreal.env_vars]]
name = "JWT_ISSUER"
label = "Clerk Issuer URL"
secret = false
required = false
